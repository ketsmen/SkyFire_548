name: promote-pending-sql

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'sql/pending_updates/*.sql'
      - 'sql/pending_updates/**/*.sql'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promote:
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ secrets.AUTOMATION_PAT || github.token }}

      - name: Import and commit pending SQL
        id: import-pending
        shell: pwsh
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin "${{ github.ref_name }}"

          ./tools/dev/promote_pending_updates.ps1 -Apply
          git add -A sql/pending_updates sql/updates

          $changes = git status --porcelain
          $status = $changes -join "`n"
          Write-Host $status

          if ([string]::IsNullOrWhiteSpace($status)) {
            Write-Host "No pending SQL changes to commit."
            "has_changes=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          git commit -m "SQL: Promote pending updates" -m "Referenced commit(s): $env:GITHUB_SHA"
          "has_changes=true" >> $env:GITHUB_OUTPUT

      - name: Push promoted SQL
        if: steps.import-pending.outputs.has_changes == 'true'
        shell: pwsh
        run: git push origin HEAD:${{ github.ref_name }}
